<div class="hero-section">

  <div class="overlay">

    <div class="hero-content">

      <span class="brand">
        URBAN FIT
      </span>

      <h1>
        STREETWEAR
        2026
      </h1>

      <p>

        Hoodies • Oversize •
        Premium Urban Style

      </p>

      <button
        class="hero-btn"

        (click)="
          irCatalogo()
        ">

        Ver catálogo

      </button>

    </div>

  </div>

</div>

<!-- BUSCADOR -->

<div class="search-container">

  <input
    type="text"

    placeholder="
    Buscar hoodie,
    gorra, camisa...
    "

    [(ngModel)]="
      busqueda
    "

    (input)="
      buscarProducto()
    "
  >

</div>

<!-- BOTÓN MIS COMPRAS -->

<div
  class="compras-btn-box">

  <button
    class="compras-btn"

    (click)="
      toggleCompras()
    ">

    🛍 Mis compras

  </button>

</div>

<!-- HISTORIAL -->

<div
  class="compras-container"

  *ngIf="
    mostrarCompras
  "
>

  <h2>
    Historial de compras
  </h2>

  <div
    class="pedido"

    *ngFor="
      let pedido
      of pedidos
    "
  >

    <p>

      <strong>
        Fecha:
      </strong>

      {{ pedido.fecha }}

    </p>

    <p>

      <strong>
        Total:
      </strong>

      ${{ pedido.total }}

    </p>

    <div
      *ngFor="
        let producto
        of pedido.productos
      "
    >

      •
      {{ producto.nombre }}

    </div>

    <hr>

  </div>

</div>

<!-- PRODUCTOS -->

<div
  id="catalogo"

  class="productos">

  <div
    class="card"

    *ngFor="
      let producto
      of productosFiltrados
    "
  >

    <img
      [src]="
        producto.imagenUrl
      "

      [alt]="
        producto.nombre
      "
    >

    <div class="info">

      <h2>
        {{ producto.nombre }}
      </h2>

      <p class="precio">

        ${{ producto.precio }}

      </p>

      <p>

        Talla:
        {{ producto.talla }}

      </p>

      <p>

        Stock:
        {{ producto.stock }}

      </p>

      <button

        (click)="
          agregarAlCarrito(
            producto
          )
        ">

        Agregar al carrito

      </button>

    </div>

  </div>

</div>
